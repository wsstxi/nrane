<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NRANE — Товар</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ========================================== -->
<!-- ШАПКА                                      -->
<!-- ========================================== -->
<header class="header">
    <div class="container header__inner">
        <a href="index.html" class="logo">
            <img src="img/logo.svg" alt="NRANE" class="logo__img" onerror="this.style.display='none'" />
            <span class="logo__text">NRANE</span>
        </a>
        <nav class="nav" id="mainNav">
            <a href="catalog.html" class="nav__link">Каталог</a>
            <a href="collections.html" class="nav__link">Коллекции</a>
            <a href="about.html" class="nav__link">О нас</a>
            <a href="contacts.html" class="nav__link">Контакты</a>
        </nav>
        <div class="header__actions">
            <a href="cart.html" class="header__cart">
                🛒 <span class="cart-count" id="cartCount">0</span>
            </a>
            <button class="header__burger" id="burgerBtn" aria-label="Меню">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <!-- ========================================== -->
        <!-- ХЛЕБНЫЕ КРОШКИ                            -->
        <!-- ========================================== -->
        <nav class="breadcrumb">
            <a href="index.html">Главная</a> /
            <a href="catalog.html">Каталог</a> /
            <span id="productBreadcrumb">Товар</span>
        </nav>

        <!-- ========================================== -->
        <!-- ДЕТАЛИ ТОВАРА                             -->
        <!-- ========================================== -->
        <section class="product-detail" id="productDetail">
            <div class="product-detail__gallery">
                <div class="product-detail__main-img">
                    <img src="" alt="" id="productImage" />
                </div>
            </div>

            <div class="product-detail__info">
                <h1 class="product-detail__title" id="productName">Название</h1>
                <div class="product-detail__collection" id="productCollection">Коллекция</div>
                <div class="product-detail__price" id="productPrice">0 ₽</div>

                <div class="product-detail__symbolism">
                    <h3> Символика</h3>
                    <p id="productSymbolism">Описание символики украшения...</p>
                </div>

                <div class="product-detail__actions">
                    <button class="btn btn-primary" id="addToCartBtn">В корзину</button>
                </div>
            </div>
        </section>
    </div>
</main>

<!-- ========================================== -->
<!-- ПОДВАЛ                                      -->
<!-- ========================================== -->
<footer class="footer">
    <div class="container footer__inner">
        <div class="footer__col">
            <a href="index.html" class="logo logo--footer">
                <img src="img/logo.svg" alt="NRANE" class="logo__img" onerror="this.style.display='none'" />
                <span class="logo__text">NRANE</span>
            </a>
            <p class="footer__copy">© 2026 NRANE. Все права защищены.</p>
            <p class="footer__copy">Сделано с ❤️ в Армении</p>
        </div>
        <div class="footer__col">
            <h4>Информация</h4>
            <ul class="footer__links">
                <li><a href="about.html">О нас</a></li>
            </ul>
        </div>
        <div class="footer__col">
            <h4>Контакты</h4>
            <a href="mailto:info@nrane.com" class="footer__email">info@nrane.com</a>
            <div class="footer__socials">
                <a href="#" class="social-link">Instagram</a>
                <a href="#" class="social-link">Telegram</a>
            </div>
        </div>
    </div>
</footer>

<script src="js/script.js"></script>
</body>
</html>
